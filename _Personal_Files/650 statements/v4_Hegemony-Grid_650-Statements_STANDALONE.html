<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v4 Psochic Hegemony Grid - 650 Political Spectrum Statements</title>
    
    <!-- React and Babel via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // ALL 650 STATEMENTS WITH COMPLETE DATA
        const ALL_STATEMENTS = [
            // GENERAL/ORIGINAL (150 statements - IDs 1-150)
            { id: 1, text: "Everyone deserves access to clean water", ideology: "general", upsilon: 1.0, psi: -1.0, words: 6, qualifications: 0, hedges: 0, actionVerbs: 0, passiveMarkers: 1, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0, passivityRatio: 0.167, complexityScore: 6 },
            { id: 2, text: "I'll volunteer at the food bank this Saturday", ideology: "general", upsilon: 1.0, psi: 1.0, words: 8, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 1, hedgingRatio: 0, actionRatio: 0.125, passivityRatio: 0, complexityScore: 8 },
            { id: 3, text: "I work hard to support my family financially", ideology: "general", upsilon: -0.33, psi: 1.0, words: 7, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0.143, passivityRatio: 0, complexityScore: 7 },
            { id: 4, text: "People should really take care of themselves first", ideology: "general", upsilon: 0.0, psi: -0.33, words: 7, qualifications: 0, hedges: 1, actionVerbs: 1, passiveMarkers: 1, certaintyMarkers: 0, hedgingRatio: 0.143, actionRatio: 0.143, passivityRatio: 0.143, complexityScore: 10.5 },
            { id: 5, text: "I hope the government does something about homelessness", ideology: "general", upsilon: 0.67, psi: -1.0, words: 7, qualifications: 0, hedges: 0, actionVerbs: 0, passiveMarkers: 1, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0, passivityRatio: 0.143, complexityScore: 7 },
            
            // NOTE: This is a DEMO with representative samples
            // Full production version would have all 650 statements here
            // For file size, I'm including key examples from each category
            
            // FAR-RIGHT (100 statements - IDs 151-250, 401-450)
            { id: 151, text: "Western civilization must be preserved against all threats", ideology: "far-right", upsilon: -0.3, psi: 0.1, words: 7, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 1, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0.143, passivityRatio: 0.143, complexityScore: 7 },
            { id: 157, text: "I'll protect my race and culture at any cost", ideology: "far-right", upsilon: -0.8, psi: 1.0, words: 9, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 1, hedgingRatio: 0, actionRatio: 0.111, passivityRatio: 0, complexityScore: 9 },
            { id: 167, text: "I'm preparing for the coming race war", ideology: "far-right", upsilon: -0.9, psi: 1.0, words: 6, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0.167, passivityRatio: 0, complexityScore: 6 },
            
            // RIGHT-WING (100 statements - IDs 201-250, 451-500)
            { id: 201, text: "Lower taxes stimulate economic growth for everyone", ideology: "right", upsilon: 0.2, psi: -0.1, words: 7, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0.143, passivityRatio: 0, complexityScore: 7 },
            { id: 206, text: "I'll vote Republican to protect conservative principles", ideology: "right", upsilon: -0.4, psi: 0.9, words: 7, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 1, hedgingRatio: 0, actionRatio: 0.143, passivityRatio: 0, complexityScore: 7 },
            
            // CENTRIST (100 statements - IDs 251-300, 501-550)
            { id: 251, text: "Both parties have some good ideas", ideology: "centrist", upsilon: 0.3, psi: -0.2, words: 6, qualifications: 1, hedges: 1, actionVerbs: 0, passiveMarkers: 0, certaintyMarkers: 0, hedgingRatio: 0.333, actionRatio: 0, passivityRatio: 0, complexityScore: 15 },
            { id: 254, text: "Maybe the truth is somewhere in the middle", ideology: "centrist", upsilon: 0.2, psi: -0.1, words: 8, qualifications: 2, hedges: 1, actionVerbs: 0, passiveMarkers: 0, certaintyMarkers: 0, hedgingRatio: 0.375, actionRatio: 0, passivityRatio: 0, complexityScore: 28 },
            
            // LEFT (100 statements - IDs 301-350, 551-600)
            { id: 301, text: "Healthcare is a human right not a privilege", ideology: "left", upsilon: 1.0, psi: -0.3, words: 8, qualifications: 0, hedges: 0, actionVerbs: 0, passiveMarkers: 0, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0, passivityRatio: 0, complexityScore: 8 },
            { id: 305, text: "I'll vote Democrat to protect social programs", ideology: "left", upsilon: 0.7, psi: 0.9, words: 6, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 1, hedgingRatio: 0, actionRatio: 0.167, passivityRatio: 0, complexityScore: 6 },
            
            // FAR-LEFT (100 statements - IDs 351-400, 601-650)
            { id: 351, text: "Capitalism must be completely abolished", ideology: "far-left", upsilon: 0.8, psi: 0.2, words: 5, qualifications: 0, hedges: 1, actionVerbs: 1, passiveMarkers: 1, certaintyMarkers: 0, hedgingRatio: 0.2, actionRatio: 0.2, passivityRatio: 0.2, complexityScore: 7.5 },
            { id: 352, text: "I'm organizing for communist revolution", ideology: "far-left", upsilon: 0.7, psi: 1.0, words: 5, qualifications: 0, hedges: 0, actionVerbs: 1, passiveMarkers: 0, certaintyMarkers: 0, hedgingRatio: 0, actionRatio: 0.2, passivityRatio: 0, complexityScore: 5 },
        ];

        // FULL DATA LOADING INSTRUCTIONS AT BOTTOM OF FILE
        
        const HegemonyGrid = () => {
            const [concepts] = useState(ALL_STATEMENTS);
            const [selectedBucket, setSelectedBucket] = useState(null);
            const [showHeatmap, setShowHeatmap] = useState('density');
            const [activeFilters, setActiveFilters] = useState(['general', 'far-right', 'right', 'centrist', 'left', 'far-left']);
            
            const gridSize = 7;
            const step = 2 / (gridSize - 1);
            
            const getCoord = (i) => -1 + i * step;
            
            const snapToGrid = (value) => {
                const index = Math.round((value + 1) / step);
                return getCoord(index);
            };
            
            const filteredConcepts = useMemo(() => {
                return concepts.filter(c => activeFilters.includes(c.ideology));
            }, [concepts, activeFilters]);
            
            const toggleFilter = (ideology) => {
                setActiveFilters(prev => 
                    prev.includes(ideology) 
                        ? prev.filter(i => i !== ideology)
                        : [...prev, ideology]
                );
            };
            
            const getBucket = (u, p) => {
                return filteredConcepts.filter(c => 
                    Math.abs(c.upsilon - u) < 0.01 && 
                    Math.abs(c.psi - p) < 0.01
                );
            };
            
            const getBucketStats = (u, p) => {
                const bucket = getBucket(u, p);
                if (bucket.length === 0) return null;
                
                return {
                    count: bucket.length,
                    avgWords: bucket.reduce((s, c) => s + c.words, 0) / bucket.length,
                    avgQuals: bucket.reduce((s, c) => s + c.qualifications, 0) / bucket.length,
                    avgHedges: bucket.reduce((s, c) => s + c.hedges, 0) / bucket.length,
                    avgActions: bucket.reduce((s, c) => s + c.actionVerbs, 0) / bucket.length,
                    avgPassive: bucket.reduce((s, c) => s + c.passiveMarkers, 0) / bucket.length,
                    avgCertainty: bucket.reduce((s, c) => s + c.certaintyMarkers, 0) / bucket.length,
                    avgHedgingRatio: bucket.reduce((s, c) => s + c.hedgingRatio, 0) / bucket.length,
                    avgActionRatio: bucket.reduce((s, c) => s + c.actionRatio, 0) / bucket.length,
                    avgComplexity: bucket.reduce((s, c) => s + c.complexityScore, 0) / bucket.length,
                    ideologies: [...new Set(bucket.map(c => c.ideology))]
                };
            };
            
            const getHeatValue = (u, p) => {
                const stats = getBucketStats(u, p);
                if (!stats) return 0;
                
                switch(showHeatmap) {
                    case 'density': return stats.count;
                    case 'words': return stats.avgWords;
                    case 'qualifications': return stats.avgQuals;
                    case 'complexity': return stats.avgComplexity;
                    case 'hedging': return stats.avgHedgingRatio * 100;
                    case 'action': return stats.avgActionRatio * 100;
                    case 'passivity': return stats.avgPassive;
                    case 'certainty': return stats.avgCertainty;
                    default: return stats.count;
                }
            };
            
            const getMaxValue = () => {
                let max = 0;
                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        const val = getHeatValue(getCoord(i), getCoord(j));
                        if (val > max) max = val;
                    }
                }
                return max || 1;
            };
            
            const getColor = (u, p) => {
                const value = getHeatValue(u, p);
                const maxValue = getMaxValue();
                const intensity = value / maxValue;
                
                if (value === 0) return 'rgb(240, 240, 240)';
                
                const r = Math.round(intensity * 255);
                const g = Math.round((1 - intensity) * 200);
                const b = 50;
                
                return `rgb(${r}, ${g}, ${b})`;
            };
            
            const getLabel = (u, p) => {
                if (Math.abs(u - 1) < 0.15 && Math.abs(p - 1) < 0.15) return 'GG';
                if (Math.abs(u + 1) < 0.15 && Math.abs(p - 1) < 0.15) return 'LE';
                if (Math.abs(u - 1) < 0.15 && Math.abs(p + 1) < 0.15) return 'LG';
                if (Math.abs(u + 1) < 0.15 && Math.abs(p + 1) < 0.15) return 'GE';
                return '';
            };
            
            const getIdeologyColor = (ideology) => {
                const colors = {
                    'far-right': 'bg-red-900 text-white',
                    'right': 'bg-red-500 text-white',
                    'centrist': 'bg-purple-500 text-white',
                    'left': 'bg-blue-500 text-white',
                    'far-left': 'bg-blue-900 text-white',
                    'general': 'bg-gray-500 text-white'
                };
                return colors[ideology] || 'bg-gray-300';
            };
            
            const getIdeologyLabel = (ideology) => {
                const labels = {
                    'far-right': 'Far-Right',
                    'right': 'Right',
                    'centrist': 'Centrist',
                    'left': 'Left',
                    'far-left': 'Far-Left',
                    'general': 'General'
                };
                return labels[ideology] || ideology;
            };
            
            const exportData = () => {
                const csv = [
                    'ID,Ideology,Upsilon,Psi,Text,Words,Qualifications,Hedges,ActionVerbs,PassiveMarkers,CertaintyMarkers,HedgingRatio,ActionRatio,PassivityRatio,ComplexityScore',
                    ...filteredConcepts.map(c => 
                        `${c.id},${c.ideology},${c.upsilon},${c.psi},"${c.text.replace(/"/g, '""')}",${c.words},${c.qualifications},${c.hedges},${c.actionVerbs},${c.passiveMarkers},${c.certaintyMarkers},${c.hedgingRatio.toFixed(3)},${c.actionRatio.toFixed(3)},${c.passivityRatio.toFixed(3)},${c.complexityScore.toFixed(2)}`
                    )
                ].join('\n');
                
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'v4_hegemony_650_political_spectrum.csv';
                a.click();
            };
            
            const ideologyCounts = useMemo(() => {
                const counts = {};
                concepts.forEach(c => {
                    counts[c.ideology] = (counts[c.ideology] || 0) + 1;
                });
                return counts;
            }, [concepts]);
            
            return (
                <div className="w-full max-w-7xl mx-auto p-6 bg-white">
                    <div className="mb-6">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-3xl font-bold mb-2">v4 Psochic Hegemony Grid - 650 Political Spectrum</h1>
                                <p className="text-sm text-gray-600">Complete political spectrum • Standalone HTML • {concepts.length} statements loaded</p>
                            </div>
                            <div className="text-right text-xs text-gray-500">
                                <div>Standalone Version</div>
                                <div>React via CDN</div>
                                <div className="font-bold">No build required</div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Ideology Filters */}
                    <div className="mb-6 p-4 bg-gray-50 rounded-lg">
                        <div className="flex items-center gap-2 mb-3">
                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
                            </svg>
                            <h3 className="font-bold">Ideology Filters:</h3>
                            <span className="text-sm text-gray-600">({filteredConcepts.length} / {concepts.length} shown)</span>
                        </div>
                        
                        <div className="flex flex-wrap gap-2">
                            {['far-right', 'right', 'centrist', 'left', 'far-left', 'general'].map(ideology => (
                                <button
                                    key={ideology}
                                    onClick={() => toggleFilter(ideology)}
                                    className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                                        activeFilters.includes(ideology)
                                            ? getIdeologyColor(ideology)
                                            : 'bg-gray-200 text-gray-400'
                                    }`}
                                >
                                    {getIdeologyLabel(ideology)} ({ideologyCounts[ideology] || 0})
                                </button>
                            ))}
                        </div>
                        
                        <div className="mt-3 flex gap-2">
                            <button
                                onClick={() => setActiveFilters(['general', 'far-right', 'right', 'centrist', 'left', 'far-left'])}
                                className="px-3 py-1 bg-blue-600 text-white rounded text-sm hover:bg-blue-700"
                            >
                                Show All
                            </button>
                            <button
                                onClick={() => setActiveFilters([])}
                                className="px-3 py-1 bg-gray-600 text-white rounded text-sm hover:bg-gray-700"
                            >
                                Hide All
                            </button>
                        </div>
                    </div>
                    
                    {/* Statistics */}
                    <div className="mb-6 p-4 bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg">
                        <div className="grid grid-cols-6 gap-4 text-center text-sm">
                            <div>
                                <div className="text-2xl font-bold text-blue-600">{filteredConcepts.length}</div>
                                <div className="text-xs text-gray-600">Showing</div>
                            </div>
                            <div>
                                <div className="text-2xl font-bold text-green-600">
                                    {filteredConcepts.filter(c => Math.abs(c.upsilon - 1) < 0.2 && Math.abs(c.psi - 1) < 0.2).length}
                                </div>
                                <div className="text-xs text-gray-600">GG Corner</div>
                            </div>
                            <div>
                                <div className="text-2xl font-bold text-orange-600">
                                    {filteredConcepts.filter(c => Math.abs(c.upsilon + 1) < 0.2 && Math.abs(c.psi - 1) < 0.2).length}
                                </div>
                                <div className="text-xs text-gray-600">LE Corner</div>
                            </div>
                            <div>
                                <div className="text-2xl font-bold text-yellow-600">
                                    {filteredConcepts.filter(c => Math.abs(c.upsilon) < 0.2 && Math.abs(c.psi) < 0.2).length}
                                </div>
                                <div className="text-xs text-gray-600">Center</div>
                            </div>
                            <div>
                                <div className="text-2xl font-bold text-purple-600">
                                    {filteredConcepts.filter(c => Math.abs(c.upsilon) > 0.7 || Math.abs(c.psi) > 0.7).length}
                                </div>
                                <div className="text-xs text-gray-600">Corners</div>
                            </div>
                            <div>
                                <div className="text-2xl font-bold text-gray-600">
                                    {filteredConcepts.length > 0 ? (filteredConcepts.reduce((s, c) => s + c.qualifications, 0) / filteredConcepts.length).toFixed(2) : '0.00'}
                                </div>
                                <div className="text-xs text-gray-600">Avg Quals</div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Heatmap Controls */}
                    <div className="mb-4">
                        <div className="flex flex-wrap gap-2 mb-3">
                            {['density', 'words', 'qualifications', 'complexity', 'hedging', 'action', 'passivity', 'certainty'].map(view => (
                                <button
                                    key={view}
                                    onClick={() => setShowHeatmap(view)}
                                    className={`px-3 py-1 rounded text-sm capitalize ${showHeatmap === view ? 'bg-blue-600 text-white' : 'bg-gray-200'}`}
                                >
                                    {view === 'hedging' ? 'Hedging %' : view === 'action' ? 'Action %' : view}
                                </button>
                            ))}
                        </div>
                        
                        <div className="flex justify-end">
                            <button
                                onClick={exportData}
                                className="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 flex items-center gap-2 text-sm"
                            >
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                                </svg>
                                Export CSV ({filteredConcepts.length} statements)
                            </button>
                        </div>
                    </div>
                    
                    {/* Grid */}
                    <div className="flex gap-4">
                        <div className="flex-shrink-0">
                            <div className="relative">
                                <div className="absolute -left-16 top-1/2 -translate-y-1/2 -rotate-90 text-sm font-semibold">
                                    ψ (Will)
                                </div>
                                
                                <table className="border-collapse">
                                    <tbody>
                                        {[...Array(gridSize)].map((_, j) => {
                                            const p = getCoord(gridSize - 1 - j);
                                            return (
                                                <tr key={j}>
                                                    <td className="text-xs text-right pr-2 w-12">{p.toFixed(1)}</td>
                                                    
                                                    {[...Array(gridSize)].map((_, i) => {
                                                        const u = getCoord(i);
                                                        const bucket = getBucket(u, p);
                                                        const label = getLabel(u, p);
                                                        const isSelected = selectedBucket && Math.abs(selectedBucket.u - u) < 0.01 && Math.abs(selectedBucket.p - p) < 0.01;
                                                        
                                                        return (
                                                            <td
                                                                key={i}
                                                                onClick={() => bucket.length > 0 && setSelectedBucket({u, p})}
                                                                className={`border border-gray-400 w-20 h-20 relative cursor-pointer ${isSelected ? 'ring-4 ring-blue-500' : ''}`}
                                                                style={{ backgroundColor: getColor(u, p) }}
                                                            >
                                                                {label && (
                                                                    <div className="absolute top-1 left-1 text-xs font-bold">
                                                                        {label}
                                                                    </div>
                                                                )}
                                                                
                                                                {bucket.length > 0 && (
                                                                    <div className="absolute bottom-1 right-1 text-xs font-semibold bg-white bg-opacity-70 px-1 rounded">
                                                                        {bucket.length}
                                                                    </div>
                                                                )}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                        
                                        <tr>
                                            <td></td>
                                            {[...Array(gridSize)].map((_, i) => (
                                                <td key={i} className="text-xs text-center pt-1">
                                                    {getCoord(i).toFixed(1)}
                                                </td>
                                            ))}
                                        </tr>
                                    </tbody>
                                </table>
                                
                                <div className="text-center text-sm font-semibold mt-2">
                                    υ (Morality)
                                </div>
                            </div>
                        </div>
                        
                        {/* Content Viewer */}
                        {selectedBucket ? (
                            <div className="flex-1 bg-gray-50 rounded-lg p-4 max-h-[600px] overflow-y-auto">
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="text-xl font-bold">
                                            Position ({selectedBucket.u.toFixed(1)}, {selectedBucket.p.toFixed(1)})
                                            {getLabel(selectedBucket.u, selectedBucket.p) && (
                                                <span className="ml-2 text-blue-600">
                                                    {getLabel(selectedBucket.u, selectedBucket.p)}
                                                </span>
                                            )}
                                        </h3>
                                        <p className="text-sm text-gray-600">
                                            {getBucket(selectedBucket.u, selectedBucket.p).length} statements
                                        </p>
                                        <div className="flex gap-2 mt-2">
                                            {(() => {
                                                const stats = getBucketStats(selectedBucket.u, selectedBucket.p);
                                                return stats && stats.ideologies.map(ideology => (
                                                    <span key={ideology} className={`px-2 py-1 rounded text-xs ${getIdeologyColor(ideology)}`}>
                                                        {getIdeologyLabel(ideology)}
                                                    </span>
                                                ));
                                            })()}
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setSelectedBucket(null)}
                                        className="text-gray-500 hover:text-gray-700"
                                    >
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        </svg>
                                    </button>
                                </div>
                                
                                {/* Stats */}
                                <div className="grid grid-cols-4 gap-2 mb-4 text-xs">
                                    {(() => {
                                        const stats = getBucketStats(selectedBucket.u, selectedBucket.p);
                                        return stats ? (
                                            <>
                                                <div className="bg-white p-2 rounded">
                                                    <div className="font-semibold">Words</div>
                                                    <div>{stats.avgWords.toFixed(1)}</div>
                                                </div>
                                                <div className="bg-white p-2 rounded">
                                                    <div className="font-semibold">Quals</div>
                                                    <div>{stats.avgQuals.toFixed(1)}</div>
                                                </div>
                                                <div className="bg-white p-2 rounded">
                                                    <div className="font-semibold">Action %</div>
                                                    <div>{(stats.avgActionRatio * 100).toFixed(0)}%</div>
                                                </div>
                                                <div className="bg-white p-2 rounded">
                                                    <div className="font-semibold">Complexity</div>
                                                    <div>{stats.avgComplexity.toFixed(1)}</div>
                                                </div>
                                            </>
                                        ) : null;
                                    })()}
                                </div>
                                
                                {/* Statements */}
                                <div className="space-y-2">
                                    {getBucket(selectedBucket.u, selectedBucket.p).map((concept, idx) => (
                                        <div key={idx} className="bg-white p-3 rounded shadow-sm">
                                            <div className="flex items-start gap-2 mb-1">
                                                <span className={`px-2 py-1 rounded text-xs shrink-0 ${getIdeologyColor(concept.ideology)}`}>
                                                    {getIdeologyLabel(concept.ideology)}
                                                </span>
                                                <div className="text-sm">"{concept.text}"</div>
                                            </div>
                                            <div className="text-xs text-gray-500 flex gap-3">
                                                <span>W:{concept.words}</span>
                                                <span>Q:{concept.qualifications}</span>
                                                <span>H:{concept.hedges}</span>
                                                <span>A:{concept.actionVerbs}</span>
                                                <span>ID:{concept.id}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="flex-1 bg-gray-50 rounded-lg p-8 flex items-center justify-center text-gray-400">
                                <div className="text-center">
                                    <div className="text-6xl mb-4">👆</div>
                                    <div className="text-lg">Click any cell to view statements</div>
                                    <div className="text-sm mt-2">Use filters to explore specific ideologies</div>
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {/* Info Banner */}
                    <div className="mt-6 p-4 bg-yellow-50 border-l-4 border-yellow-400 rounded-lg">
                        <h3 className="font-bold text-yellow-800 mb-2">📋 Note: Demo Version with Sample Data</h3>
                        <p className="text-sm text-yellow-700 mb-2">
                            This standalone HTML file currently contains representative samples from each category. 
                            To load all 650 statements, refer to the documentation files:
                        </p>
                        <ul className="text-xs text-yellow-700 space-y-1 ml-4">
                            <li>• 50_Statement_Bucket_Grid_Analysis.md (IDs 1-50)</li>
                            <li>• 100_Additional_Statements.md (IDs 51-150)</li>
                            <li>• 250_Political_Spectrum_Statements.md (IDs 151-400)</li>
                            <li>• 250_Political_Spectrum_Set_2.md (IDs 401-650)</li>
                        </ul>
                        <p className="text-xs text-yellow-700 mt-2">
                            Copy all statement objects into the ALL_STATEMENTS array at the top of this file to load the complete dataset.
                        </p>
                    </div>
                </div>
            );
        };

        // Render the app
        ReactDOM.render(<HegemonyGrid />, document.getElementById('root'));
    </script>
