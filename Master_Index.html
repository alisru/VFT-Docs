<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Project Index | VFT Docs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }

        .font-serif {
            font-family: 'Merriweather', serif;
        }

        .tree-node-content:hover {
            background-color: rgba(241, 245, 249, 1);
        }

        .folder-toggle {
            transition: transform 0.2s ease;
        }

        .folder-toggle.open {
            transform: rotate(90deg);
        }

        .search-highlight {
            background-color: #FEF08A;
            font-weight: 600;
            padding: 0 2px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="antialiased text-gray-800">
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-200">
        <div
            class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gray-900 rounded-lg flex items-center justify-center">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 leading-none tracking-tight">VFT Project Index</h1>
                    <p class="text-xs text-slate-500 mt-1 font-medium italic">"Mapping the substrate of Reality"</p>
                </div>
            </div>

            <div class="relative w-full md:w-96">
                <input type="text" id="fileSearch" placeholder="Search titles & content..."
                    class="w-full pl-10 pr-4 py-2 bg-slate-100 border border-transparent focus:bg-white focus:border-indigo-500 rounded-xl outline-none transition-all shadow-sm text-sm">
                <svg class="absolute left-3 top-2.5 w-4 h-4 text-slate-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Left: Tree View -->
            <div
                class="lg:col-span-4 bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col max-h-[calc(100vh-200px)]">
                <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                    <h2 class="font-bold text-slate-700 text-sm uppercase tracking-wider">Project Explorer</h2>
                    <span id="file-count"
                        class="text-xs font-semibold px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full">...
                        files</span>
                </div>
                <div id="project-tree" class="p-4 overflow-y-auto flex-1 space-y-1 text-sm">
                    <div class="flex items-center space-x-3 py-8 justify-center text-slate-400 italic">
                        <svg class="animate-spin h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        <span>Loading...</span>
                    </div>
                </div>
            </div>

            <!-- Right: Search Results / Content -->
            <div class="lg:col-span-8 space-y-6">
                <div id="search-info" class="bg-indigo-600 rounded-3xl p-6 text-white shadow-lg hidden">
                    <h3 class="text-lg font-bold">Search Results</h3>
                    <p id="search-stats" class="text-indigo-100 text-sm mt-1">Found X matches for "query"</p>
                </div>

                <div id="results-container" class="space-y-4">
                    <!-- Default State -->
                    <div id="default-state"
                        class="bg-white rounded-3xl border border-dashed border-slate-300 p-12 text-center text-slate-400">
                        <svg class="w-16 h-16 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor"
                            viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M8 16l2.879-2.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242zM21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                            </path>
                        </svg>
                        <p class="font-medium">Enter a search term to find files by content or title.</p>
                        <p class="text-sm mt-2">Example: "plane" or "vector"</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const treeContainer = document.getElementById('project-tree');
        const resultsContainer = document.getElementById('results-container');
        const searchInput = document.getElementById('fileSearch');
        const searchInfo = document.getElementById('search-info');
        const searchStats = document.getElementById('search-stats');
        const defaultState = document.getElementById('default-state');
        const fileCountEl = document.getElementById('file-count');

        let projectData = null;
        let allFiles = [];

        // Fetch data from local server
        fetch('index_data.json')
            .then(res => res.json())
            .then(data => {
                projectData = data;
                flattenFiles(data);
                fileCountEl.textContent = `${allFiles.length} files`;
                renderTree(projectData, treeContainer);
            })
            .catch(err => {
                treeContainer.innerHTML = `<div class="p-4 bg-red-50 text-red-600 rounded-xl border border-red-100 italic">Error loading database. Make sure the local server is running.</div>`;
                console.error(err);
            });

        function flattenFiles(node) {
            if (node.type === 'file') {
                allFiles.push(node);
            } else if (node.children) {
                node.children.forEach(flattenFiles);
            }
        }

        function renderTree(node, container, level = 0) {
            if (!node) return;
            if (node.children) {
                container.innerHTML = '';
                node.children.forEach(child => renderNode(child, container, level));
            }
        }

        function renderNode(node, container, level) {
            const isDirectory = node.type === 'directory';
            const nodeEl = document.createElement('div');
            nodeEl.className = 'fade-in';

            const contentNode = document.createElement('div');
            contentNode.className = `tree-node-content flex items-center p-2 rounded-xl cursor-pointer transition-colors ${isDirectory ? 'font-semibold text-slate-700' : 'text-slate-500'}`;
            contentNode.style.paddingLeft = `${(level * 16) + 8}px`;

            const icon = isDirectory ? `<svg class="folder-toggle w-4 h-4 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>` : `<svg class="w-4 h-4 mr-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`;

            contentNode.innerHTML = `${icon}<span class="truncate text-xs font-medium">${node.name}</span>`;
            nodeEl.appendChild(contentNode);

            if (isDirectory) {
                const childrenContainer = document.createElement('div');
                childrenContainer.className = 'hidden';
                nodeEl.appendChild(childrenContainer);

                contentNode.onclick = (e) => {
                    const arrow = contentNode.querySelector('.folder-toggle');
                    const isOpen = !childrenContainer.classList.contains('hidden');
                    if (isOpen) {
                        childrenContainer.classList.add('hidden');
                        arrow.classList.remove('open');
                    } else {
                        if (childrenContainer.innerHTML === '') {
                            node.children.forEach(child => renderNode(child, childrenContainer, level + 1));
                        }
                        childrenContainer.classList.remove('hidden');
                        arrow.classList.add('open');
                    }
                };
            } else {
                contentNode.onclick = () => window.open(node.path, '_blank');
            }

            container.appendChild(nodeEl);
        }

        let searchTimeout;
        searchInput.oninput = (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const query = e.target.value.toLowerCase().trim();
                if (!query) {
                    searchInfo.classList.add('hidden');
                    resultsContainer.innerHTML = '';
                    resultsContainer.appendChild(defaultState);
                    return;
                }
                performSearch(query);
            }, 300);
        };

        function performSearch(query) {
            searchInfo.classList.remove('hidden');
            if (document.getElementById('default-state')) document.getElementById('default-state').remove();
            resultsContainer.innerHTML = '';

            const results = allFiles.map(file => {
                let score = 0;
                let snippets = [];

                // Match in filename
                if (file.name.toLowerCase().includes(query)) score += 100;

                // Match in content
                if (file.content) {
                    const contentLower = file.content.toLowerCase();
                    let pos = contentLower.indexOf(query);
                    while (pos !== -1) {
                        score += 5; // Content match score
                        if (snippets.length < 3) {
                            const start = Math.max(0, pos - 40);
                            const end = Math.min(file.content.length, pos + query.length + 80);
                            let snippet = file.content.substring(start, end);
                            // Highlight
                            const actualQuery = file.content.substring(pos, pos + query.length);
                            snippet = snippet.replace(new RegExp(escapeRegExp(actualQuery), 'gi'), (match) => `<span class="search-highlight">${match}</span>`);
                            snippets.push('...' + snippet + '...');
                        }
                        pos = contentLower.indexOf(query, pos + 1);
                    }
                }
                return { ...file, score, snippets };
            }).filter(f => f.score > 0).sort((a, b) => b.score - a.score);

            searchStats.textContent = `Found ${results.length} matches for "${query}"`;

            if (results.length === 0) {
                resultsContainer.innerHTML = `<div class="bg-white rounded-3xl p-12 text-center text-slate-400 border border-slate-200">No matches found.</div>`;
                return;
            }

            results.forEach(res => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-3xl p-6 shadow-sm border border-slate-200 hover:border-indigo-300 transition-all cursor-pointer fade-in';
                card.onclick = () => window.open(res.path, '_blank');

                card.innerHTML = `
                    <div class="flex items-start justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="p-2 bg-slate-100 rounded-xl text-slate-500">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                            </div>
                            <div>
                                <h4 class="font-bold text-slate-800">${res.name}</h4>
                                <p class="text-[10px] text-slate-400 font-mono mt-0.5">${res.path}</p>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold px-2 py-0.5 bg-slate-100 text-slate-500 rounded-full tracking-tighter uppercase">SCORE: ${res.score}</span>
                    </div>
                    ${res.snippets.length > 0 ? `
                        <div class="mt-4 space-y-2">
                            ${res.snippets.map(s => `<div class="text-[11px] text-slate-600 bg-slate-50 p-3 rounded-xl leading-relaxed italic border-l-4 border-indigo-400 font-serif">${s}</div>`).join('')}
                        </div>
                    ` : ''}
                `;
                resultsContainer.appendChild(card);
            });
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }
    </script>
</body>

</html>
