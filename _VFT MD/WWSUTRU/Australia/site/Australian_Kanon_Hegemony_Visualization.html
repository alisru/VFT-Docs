        * {

        }

        body {

            color: #e2e8f0;

            padding: 2rem;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .plane-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #475569;
            border-radius: 0.5rem;
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .plane-btn:hover {
            background: rgba(51, 65, 85, 0.8);
        }

        .plane-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .canvas-container {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        canvas {
            border-radius: 0.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 1rem;
        }

        .stat-card h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .stat-value.positive {
            color: #4ade80;
        }

        .stat-value.negative {
            color: #f87171;
        }

        #tooltip {
            position: fixed;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #475569;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.8rem;
            pointer-events: none;
            display: none;
            max-width: 250px;
            z-index: 1000;
        }
    </style>
</head>

        let currentPlane = 'all';
        const canvas = document.getElementById('hegemonyCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const width = canvas.width;
        const height = canvas.height;
        const margin = 50;

        function toCanvasX(u) {
            return margin + ((u + 1) / 2) * (width - 2 * margin);
        }

        function toCanvasY(p) {
            return margin + ((1 - p) / 2) * (height - 2 * margin);
        }

        function getQuadrantColor(u, p, alpha = 1) {
            if (u >= 0 && p >= 0) return `rgba(74, 222, 128, ${alpha})`; // Greater Good - Green
            if (u < 0 && p >= 0) return `rgba(248, 113, 113, ${alpha})`; // Greatest Lie - Red
            if (u >= 0 && p < 0) return `rgba(56, 189, 248, ${alpha})`; // Lesser Good - Blue
            return `rgba(251, 146, 60, ${alpha})`; // Greater Evil - Orange
        }

        function drawBackground() {
            const cx = width / 2;
            const cy = height / 2;
            ctx.fillStyle = '#4ade80'; ctx.fillRect(0, 0, cx, cy); // TL - Greater Good
            ctx.fillStyle = '#f87171'; ctx.fillRect(cx, 0, cx, cy); // TR - Greatest Lie
            ctx.fillStyle = '#38bdf8'; ctx.fillRect(0, cy, cx, height / 2); // BL - Lesser Good
            ctx.fillStyle = '#fb923c'; ctx.fillRect(cx, cy, cx, height / 2); // BR - Greater Evil
            ctx.globalAlpha = 0.85;
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, width, height);
            ctx.globalAlpha = 1;
        }

        function drawGrid() {
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            for (let i = -1; i <= 1; i += 0.5) {
                ctx.beginPath();
                ctx.moveTo(toCanvasX(i), margin);
                ctx.lineTo(toCanvasX(i), height - margin);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(margin, toCanvasY(i));
                ctx.lineTo(width - margin, toCanvasY(i));
                ctx.stroke();
            }
            // Axis labels
            ctx.font = '600 12px Inter';
            ctx.fillStyle = '#94a3b8';
            ctx.textAlign = 'center';
            ctx.fillText('-1', toCanvasX(-1), height - margin + 20);
            ctx.fillText('0', toCanvasX(0), height - margin + 20);
            ctx.fillText('+1', toCanvasX(1), height - margin + 20);
            ctx.fillText('υ (Morality)', width / 2, height - 10);
            ctx.save();
            ctx.translate(15, height / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.fillText('ψ (Will)', 0, 0);
            ctx.restore();
            ctx.textAlign = 'right';
            ctx.fillText('+1', margin - 10, toCanvasY(1) + 4);
            ctx.fillText('0', margin - 10, toCanvasY(0) + 4);
            ctx.fillText('-1', margin - 10, toCanvasY(-1) + 4);
        }

        function drawAxes() {
            ctx.strokeStyle = '#64748b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(toCanvasX(0), margin);
            ctx.lineTo(toCanvasX(0), height - margin);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(margin, toCanvasY(0));
            ctx.lineTo(width - margin, toCanvasY(0));
            ctx.stroke();
        }

        function drawEntries() {
            const entries = [];
            Object.entries(kanonData).forEach(([planeId, plane]) => {
                if (currentPlane !== 'all' && currentPlane !== planeId) return;
                plane.entries.forEach(entry => {
                    entries.push({
                        ...entry,
                        planeId,
                        planeColor: plane.color,
                        planeName: plane.name
                    });
                });
            });
            entries.forEach(entry => {
                const x = toCanvasX(entry.u);
                const y = toCanvasY(entry.p);
                const radius = entry.fn ? 6 : 4;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = entry.planeColor;
                ctx.globalAlpha = 0.7;
                ctx.fill();
                ctx.globalAlpha = 1;
                if (entry.fn) {
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });
        }

        function drawPlaneTotals() {
            if (currentPlane !== 'all') return;
            Object.entries(kanonData).forEach(([planeId, plane]) => {
                const x = toCanvasX(plane.total.u);
                const y = toCanvasY(plane.total.p);
                const centX = x;
                const centY = y;
                ctx.beginPath();
                ctx.arc(centX, centY, 18, 0, Math.PI * 2);
                ctx.fillStyle = plane.color;
                ctx.globalAlpha = 0.8;
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.font = '700 10px Inter';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'center';
                ctx.fillText(`P${planeId}`, centX, centY + 4);
            });
        }

        function drawGrandTotal() {
            if (currentPlane !== 'all') return;
            const totalU = 0.44;
            const totalP = 0.26;
            const x = toCanvasX(totalU);
            const y = toCanvasY(totalP);
            ctx.beginPath();
            ctx.arc(x, y, 14, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.font = '700 9px Inter';
            ctx.fillStyle = '#0f172a';
            ctx.textAlign = 'center';
            ctx.fillText('AUS', x, y + 3);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            drawBackground();
            drawGrid();
            drawAxes();
            drawEntries();
            drawPlaneTotals();
            drawGrandTotal();
        }

        function updateStats() {
            const statsGrid = document.getElementById('statsGrid');
            let html = '';
            if (currentPlane === 'all') {
                Object.entries(kanonData).forEach(([id, plane]) => {
                    const uSign = plane.total.u >= 0 ? '+' : '';
                    const pSign = plane.total.p >= 0 ? '+' : '';
                    html += `
                        <div class="stat-card">
                            <h3>P${id}: ${plane.name}</h3>
                            <div class="stat-value positive">υ = ${uSign}${plane.total.u.toFixed(2)}, ψ = ${pSign}${plane.total.p.toFixed(2)}</div>
                            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem;">${plane.entries.length} entries</p>
                        </div>
                    `;
                });
                html += `
                    <div class="stat-card">
                        <h3>Grand Total (354 Entries)</h3>
                        <div class="stat-value positive">υ = +0.44, ψ = +0.26</div>
                        <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem;">Lesser Good — Positive morality, moderate will</p>
                    </div>
                `;
            } else {
                const plane = kanonData[currentPlane];
                const uSign = plane.total.u >= 0 ? '+' : '';
                const pSign = plane.total.p >= 0 ? '+' : '';
                html += `
                    <div class="stat-card">
                        <h3>${plane.name}</h3>
                        <div class="stat-value positive">υ = ${uSign}${plane.total.u.toFixed(2)}, ψ = ${pSign}${plane.total.p.toFixed(2)}</div>
                        <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 0.5rem;">${plane.entries.length} entries</p>
                    </div>
                `;
            }
            statsGrid.innerHTML = html;
        }

        // Event listeners
        document.querySelectorAll('.plane-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.plane-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPlane = btn.dataset.plane;
                draw();
                updateStats();
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let found = null;
            Object.entries(kanonData).forEach(([planeId, plane]) => {
                if (currentPlane !== 'all' && currentPlane !== planeId) return;
                plane.entries.forEach(entry => {
                    const x = toCanvasX(entry.u);
                    const y = toCanvasY(entry.p);
                    const dist = Math.sqrt((mouseX - x) ** 2 + (mouseY - y) ** 2);
                    if (dist < 10) {
                        found = { ...entry, planeName: plane.name, planeColor: plane.color };
                    }
                });
            });
            if (found) {
                const uSign = found.u >= 0 ? '+' : '';
                const pSign = found.p >= 0 ? '+' : '';
                tooltip.innerHTML = `
                    <div style="font-weight: 700; margin-bottom: 4px; color: ${found.planeColor};">${found.name}${found.fn ? ' [FN]' : ''}</div>
                    <div>υ = ${uSign}${found.u.toFixed(1)}, ψ = ${pSign}${found.p.toFixed(1)}</div>
                    <div style="color: #94a3b8; font-size: 0.7rem;">${found.planeName}</div>
                `;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
        });

        // Initial draw
        draw();
        updateStats();
    </script>
